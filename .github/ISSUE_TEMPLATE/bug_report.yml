name: Bug report
description: Report a reproducible problem
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened?
      placeholder: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Open app
        2. Tap ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: input
    id: device
    attributes:
      label: Device and Android version
      placeholder: Pixel 7, Android 15

  - type: input
    id: app_version
    attributes:
      label: App version or commit
      placeholder: 0.1.0 / abc123
